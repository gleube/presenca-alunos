<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Presença USP</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f3f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    width:90%;
    max-width:420px;
    padding:30px;
    border-radius:16px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
    
.logo{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:20px;
}
.logo img{
    max-width:100%;
    height:180px;
    object-fit:contain;
}


h2{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

input, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#990000;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#770000;
}

.status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

.loading{
    color:orange;
}

#formArea{
    display:none;
}

#userInfo{
    text-align:center;
    margin-bottom:15px;
    color:#444;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

   <div class="logo">

   <img
    src="logo.png"
    alt="FCFRP USP"
>

</div>
    <h2>Registro de Presença Bioquímica</h2>

    <!-- LOGIN GOOGLE -->

    <div id="loginArea">

        <div
            id="g_id_onload"
            data-client_id="479212636225-4ifb7bgvfkmrlakfmn8ohfu5ku8u4ger.apps.googleusercontent.com"
            data-callback="handleCredentialResponse">
        </div>

        <div
            class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="outline"
            data-text="sign_in_with"
            data-shape="rectangular"
            data-logo_alignment="left">
        </div>

    </div>

    <!-- FORMULÁRIO -->

    <div id="formArea">

        <div id="userInfo"></div>

        <form id="presencaForm">

            <input
                type="text"
                id="nome"
                placeholder="Nome Completo"
                required
            />

            <input
                type="text"
                id="matricula"
                placeholder="Matrícula"
                required
            />

            <button type="submit">
                Registrar Presença
            </button>

        </form>

    </div>

    <div class="status" id="status"></div>

</div>

<script>

// ====================================
// URL DO APPS SCRIPT
// ====================================

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTeaMAtY7kV4_DbC0Sf_K9X7sQF3yyWNHhwsKRu3QuWInTR50CdK1nYdqsilgSlE4a/exec";

// ====================================
// LOCALIZAÇÃO DA INSTITUIÇÃO
// ====================================

const LAT_ESCOLA = -21.2428;
const LNG_ESCOLA = -47.8384;

const DISTANCIA_MAXIMA = 100;

let usuarioEmail = "";

// ====================================
// LOGIN GOOGLE
// ====================================

function handleCredentialResponse(response){

    const data = parseJwt(response.credential);

    usuarioEmail = data.email;

    // ====================================
    // VALIDA DOMÍNIOS
    // ====================================

    if(
        !usuarioEmail.endsWith("@usp.br") &&
        !usuarioEmail.endsWith("@ee.ufcg.edu.br")
    ){

        document.getElementById("status").className =
            "status error";

        document.getElementById("status").innerText =
            "Use um e-mail institucional autorizado.";

        return;
    }

    // MOSTRA FORMULÁRIO

    document.getElementById("loginArea").style.display =
        "none";

    document.getElementById("formArea").style.display =
        "block";

    document.getElementById("userInfo").innerHTML =
        "Logado como:<br><b>" + usuarioEmail + "</b>";
}

// ====================================
// DECODIFICAR TOKEN GOOGLE
// ====================================

function parseJwt(token) {

    const base64Url = token.split('.')[1];

    const base64 = base64Url
        .replace(/-/g, '+')
        .replace(/_/g, '/');

    const jsonPayload = decodeURIComponent(

        atob(base64)
        .split('')
        .map(function(c) {

            return '%' +
                ('00' + c.charCodeAt(0).toString(16))
                .slice(-2);

        })
        .join('')

    );

    return JSON.parse(jsonPayload);
}

// ====================================
// CALCULAR DISTÂNCIA GPS
// ====================================

function calcularDistancia(lat1, lon1, lat2, lon2){

    const R = 6371e3;

    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;

    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(Δφ/2) * Math.sin(Δφ/2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ/2) * Math.sin(Δλ/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

// ====================================
// ENVIO FORMULÁRIO
// ====================================

document.getElementById("presencaForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const status = document.getElementById("status");

    status.className = "status loading";

    status.innerText =
        "Capturando localização...";

    const nome =
        document.getElementById("nome").value;

    const matricula =
        document.getElementById("matricula").value;

    navigator.geolocation.getCurrentPosition(

        async function(position){

            const latitude =
                position.coords.latitude;

            const longitude =
                position.coords.longitude;

            const distancia = calcularDistancia(
                LAT_ESCOLA,
                LNG_ESCOLA,
                latitude,
                longitude
            );

            // ====================================
            // VALIDA DISTÂNCIA
            // ====================================

            if(distancia > DISTANCIA_MAXIMA){

                status.className = "status error";

                status.innerHTML =
                    "Você está fora da área permitida.<br>" +
                    "Distância detectada: " +
                    Math.round(distancia) +
                    " metros.";

                return;
            }

            status.innerText =
                "Enviando presença...";

            const dados = {

                nome,
                email: usuarioEmail,
                matricula,
                latitude,
                longitude,
                horario: new Date().toLocaleString()

            };

            try{

              const resposta = await fetch(SCRIPT_URL, {

    method: "POST",

    mode: "no-cors",

    headers: {
        "Content-Type": "text/plain"
    },

    body: JSON.stringify(dados)

});

status.className =
    "status success";

status.innerHTML =
    "Presença registrada com sucesso!";

                   document
                    .getElementById("presencaForm")
                    .reset();

           }catch(error){

    console.error(error);

    status.className =
        "status error";

    status.innerText =
        "Erro ao enviar presença: " + error;

}

        },

        function(){

            status.className =
                "status error";

            status.innerText =
                "Permita acesso à localização.";

        }

    );

});

</script>

</body>
</html>
